[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Bench default serial monitor speed
monitor_speed = 115200

; Only one external dependency is needed for this bench task
lib_deps =
  adafruit/Adafruit ADS1X15@^2.5.0

build_flags =
  -DCORE_DEBUG_LEVEL=0
